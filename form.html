    <body class="page-wrapper">
        <section class="logo">
            <div class="container-fluid">
                <div class="row">
                    <div class="col col-lg col-md col-sm">
</div>

</div>

        <section class="body-content mb-2">
            <div class="container-fluid">
                <div class="row">
                    <div class="col col-lg col-md col-sm">
</div>
                    <div class="col-10 col-lg-5 col-md-5 col-sm-10 ">
                        <h2>vote for your favourite & receive 1 of 5,000 coupon</h2>
                        <h4>Please fill in the form to vote</h4>
                    </div>
                    <div class="col col-lg col-md col-sm">
</div>
                </div>
                <div class="mt-3 row">
                    <div class="col col-lg col-md col-sm">
</div>
                    <div class="col-10 col-lg-5 col-md-5 col-sm-10">
                        <form role="form">
                            <div class="mb-1">
                                <label for="firstAndLastName">First and last name*</label>
                                <input type="text" class="form-control" id="firstAndLastName" name="firstAndLastName" aria-describedby="firstAndLastName" placeholder="first and last name" required="true"/>
                            </div>
                            <div class="mb-1">
                                <label for="cellNumber">Cell number*</label>
                                <input type="tel" class="form-control" id="cellNumber" name="cellNumber" placeholder="e.g 0841234567" required="true"/>
                            </div>
                            <!-- <div class="mb-1">
                                <label for="EmailAddress">Email address*</label>
                                <input type="email" class="form-control" id="EmailAddress" name="EmailAddress" placeholder="example@domain.com"/>
                            </div> -->
                            <div class="mb-1">
                                <label for="favourite">Which McCain Chip is your favourite?*</label>
                                <select id="favourite" name="favourite" class="form-control" required="true">
                                    <option value="">select</option>
                                    <option value="McCain Air Fryer">McCain Air Fryer</option>
                                    <option value="McCain Skinny">McCain Skinny</option>
                                    <option value="McCain Slap Chip">McCain Slap Chip</option>
                                    <option value="I don’t eat McCain Chips">I don’t eat McCain Chips</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="why">Why is this your favourite McCain chip range?*</label>
                                <select id="why" name="why" class="form-control" required="true">
                                    <option value="">select</option>
                                    <option value="Great taste">Great taste</option>
                                    <option value="Crispy texture">Crispy texture</option>
                                    <option value="Quick and easy">Quick and easy to prepare</option>
                                    <option value="Healthier option">Healthier option</option>
                                    <option value="Versatile">Versatile across different meals</option>
                                    <option value="Quality">Consistent quality every time</option>
                                    <option value="Quick and easy to prepare">Quick and easy to prepare</option>
                                    <option value="Good value for money">Good value for money</option>
                                    <option value="Family favourite">Family favourite</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="condiments">Which condiments (Sauces, Spices) do you enjoy pairing your fave McCain Fries with?*</label>
                                <select id="condiments" name="condiments" class="form-control" required="true">
                                    <option value="">select</option>
                                    <option value="Salt & Vinegar">Salt & Vinegar</option>
                                    <option value="Tomato Sauce">Tomato Sauce</option>
                                    <option value="Chilli Sauce">Chilli Sauce</option>
                                    <option value="BBQ spice">BBQ Spice</option>
                                    <option value="Steakhouse spice">Steakhouse Spice</option>
                                    <option value="Chilli Spice">Chilli Spice</option>
                                    <option value="Mayo">Mayo</option>
                                    <option value="Mustard">Mustard</option>
                                    <option value="None ">None Sauce</option>
                                    <option value="Other ">Other </option>
                                </select>
                            </div>
                            <div class="form-check mb-2">
                                <input type="checkbox" class="form-check-input" id="OptIn"/>
                                <label class="form-check-label pb-0 ps-2 pt-0" for="OptIn">Opt in for communications
</label>
                            </div>
                            <div class="form-check mb-1">

                                <label class="form-check-label pb-0 ps-2 pt-0" for="termsAndConditions">I accept the <a href="#"> Terms and Conditions*</a>
                                </label>

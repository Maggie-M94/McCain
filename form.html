        <section>

            <div class="container-fluid ">
                <div class="backdrop-row row">

</div>
                    <div class="backdrop col-10 col-lg-6 col-md-6 col-sm-10">
                        <div class="row">
                            <div class="col-1 col-lg-1 col-md-1 col-sm-1">
</div>
                            <div class="col-10 col-lg-10 col-md-10 col-sm-10">
                                <h1>Regista-te para teres a chance de ganhar prémios incríveis </h1>
                                <h4>Preenche o formulário abaixo para participar</h4>
                            </div>
                            <div class="col-1 col-lg-1 col-md-1 col-sm-1">
</div>
                        </div>
                        <div class="row">
                            <div class="col-1 col-lg-1 col-md-1 col-sm-1">
</div>
                            <div class="main-content col-10 col-lg-10 col-md-10 col-sm-10"> 
                                <form name="form" method="post" action="landing-page.html" onsubmit="return validateAge()">
                                    <div class="row mb-3">
                                        <div class="mb-1">
                                            <label for="Nomeesobrenome">Nome e sobrenome*</label>
                                            <input type="text" class="form-control" id="Nomeesobrenome" name="Nomeesobrenome" aria-describedby="Nomeesobrenome" placeholder="Nome e sobrenome" required="true"/>
                                        </div>
                                        <div class="mb-1">
                                            <label for="gênero">Gênero*</label>
                                            <select id="gênero" name="gênero" class="form-control" required="true">
                                                <option value="">selecione</option>
                                                <option value="1">1</option>
                                                <option value="2">2</option>
                                                <option value="3">3</option>
                                            </select>
                                        </div>
                                        <div class="mb-1">
                                            <label for="celular">Número de celular*</label>
                                            <input type="tel" class="form-control" id="celular" name="celular" placeholder="ex +258 841234567" required="true"/>
                                        </div>
                                        <div class="mb-1">
                                            <label for="email">Endereço de e-mail</label>
                                            <input type="email" class="form-control" id="email" name="email" placeholder="exemplo@dominio.com"/>
                                        </div>
                                        <div class="mb-1">
                                            <label for="região">Região*</label>
                                            <select id="região" name="região" class="form-control" required="true">
                                                <option value="">selecione</option>
                                                <option value="1">1</option>
                                                <option value="2">2</option>
                                                <option value="3">3</option>
                                            </select>
                                        </div>
                                        <div class="form-check mb-1 pt-2">
                                            <input type="checkbox" class="form-check-input" id="optIn" name="optIn"/>
                                            <label class="form-check-label pb-0 pt-2" for="optIn" style="padding-left:10px;">Aceito receber comunicações da 2M</label>
                                        </div>
                                        <div class="form-check mb-1">
                                            <input type="checkbox" class="form-check-input" id="termsAndConditions" name="termsAndConditions"/>
                                            <label class="form-check-label pb-0 pt-0" for="termsAndConditions" style="padding-left:10px;">Aceito os <a href="url">Termos e Condições*</a>
                                            </label>
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-primary">ENVIAR</button>
                                </form>

</div>
